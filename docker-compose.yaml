services:
  overwatch:
    build:
      context: .
      dockerfile: packaging/docker/Dockerfile
    hostname: overwatch
    ports:
      - "3030:3030"
    volumes:
      - ./overwatch-data:/etc/overwatch
    command:
      [
        "serve",
        "--bind-address",
        "0.0.0.0",
        "--config",
        "/etc/overwatch/overwatch.yaml",
      ]
