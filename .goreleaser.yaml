version: 2

builds:
  - main: ./cmd/overwatch
    binary: overwatch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/christianmscott/overwatch/internal/version.Version={{.Version}}
      - -X github.com/christianmscott/overwatch/internal/version.Commit={{.Commit}}
      - -X github.com/christianmscott/overwatch/internal/version.Date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: processfoundry
      name: tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/processfoundry/overwatch"
    description: "Self-hosted monitoring server and TUI for operators"
    license: "MIT"
    test: |
      system "#{bin}/overwatch", "version"

dockers:
  - image_templates:
      - "ghcr.io/processfoundry/overwatch:{{ .Version }}-amd64"
      - "ghcr.io/processfoundry/overwatch:latest-amd64"
    dockerfile: packaging/docker/Dockerfile.release
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
  - image_templates:
      - "ghcr.io/processfoundry/overwatch:{{ .Version }}-arm64"
      - "ghcr.io/processfoundry/overwatch:latest-arm64"
    dockerfile: packaging/docker/Dockerfile.release
    use: buildx
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/processfoundry/overwatch:{{ .Version }}"
    image_templates:
      - "ghcr.io/processfoundry/overwatch:{{ .Version }}-amd64"
      - "ghcr.io/processfoundry/overwatch:{{ .Version }}-arm64"
  - name_template: "ghcr.io/processfoundry/overwatch:latest"
    image_templates:
      - "ghcr.io/processfoundry/overwatch:latest-amd64"
      - "ghcr.io/processfoundry/overwatch:latest-arm64"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
