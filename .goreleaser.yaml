version: 2

builds:
  - main: ./cmd/overwatch
    binary: overwatch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/christianmscott/overwatch/internal/version.Version={{.Version}}
      - -X github.com/christianmscott/overwatch/internal/version.Commit={{.Commit}}
      - -X github.com/christianmscott/overwatch/internal/version.Date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: processfoundry
      name: tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/processfoundry/overwatch"
    description: "Self-hosted monitoring server and TUI for operators"
    license: "MIT"
    test: |
      system "#{bin}/overwatch", "version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
